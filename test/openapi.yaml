openapi: 3.1.0
info:
  title: test title
  description: test description
  version: 1.0.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: /
paths:
  /api/v1/filter:
    get:
      tags:
        - Misc
      operationId: filter
      parameters:
        - name: ids
          in: query
          schema:
            type: string
        - name: uuids
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ids:
                    type: array
                    items:
                      type: integer
                  uuids:
                    type: array
                    items:
                      type: string
                      format: uuid
  /api/v1/form/submit:
    post:
      tags:
        - Misc
      operationId: submitForm
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/v1/headers/echo:
    get:
      tags:
        - Misc
      operationId: echoHeader
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: string
  /api/v1/items/{itemId}/uuid:
    get:
      tags:
        - Items
      operationId: getItemByUUID
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                  format: uuid
  /api/v1/resources:
    get:
      tags:
        - Resources
      summary: List all resources
      operationId: listResources
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourcePage'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/resources/{resourceId}:
    get:
      tags:
        - Resources
      operationId: getResource
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/resources/{resourceId}/metadata:
    put:
      tags:
        - Resources
      operationId: updateResourceMetadata
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  additionalProperties:
                    type: string
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  metadata:
                    type: object
                    additionalProperties:
                      type: string
                  resource:
                    $ref: '#/components/schemas/Resource'
  /api/v1/resources/bulk:
    post:
      tags:
        - Resources
      operationId: createResourcesBulk
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Resource'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/resources/search:
    get:
      tags:
        - Resources
      operationId: searchResources
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'
  /api/v1/tenants:
    get:
      tags:
        - Tenants
      summary: List all tenants
      operationId: listTenants
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tenant'
    post:
      tags:
        - Tenants
      operationId: createTenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tenant'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
  /api/v1/tenants/{tenantID}:
    get:
      tags:
        - Tenants
      operationId: getTenant
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      tags:
        - Tenants
      operationId: updateTenant
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tenant'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
    delete:
      tags:
        - Tenants
      operationId: deleteTenant
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/tenants/{tenantID}/resources:
    get:
      tags:
        - Tenants
        - Resources
      operationId: listTenantResources
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
        - Tenants
        - Resources
      operationId: createTenantResource
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
components:
  schemas:
    ProblemDetails:
      type: object
      properties:
        detail:
          type: string
        instance:
          type: string
        status:
          type: integer
        title:
          type: string
        type:
          type: string
    Resource:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        name:
          type: string
        resource_id:
          type: integer
        tenant_id:
          type: integer
        type:
          type: string
    ResourcePage:
      type: object
      properties:
        Models:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        Next:
          type: string
          format: uuid
    Tenant:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        name:
          type: string
        plan:
          type: string
        tenant_id:
          type: integer
