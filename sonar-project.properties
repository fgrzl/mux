# Source configuration
sonar.sources=.
sonar.inclusions=**/*.go
sonar.exclusions=**/*_test.go,**/mocks/**

# Test configuration
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.go.tests.reportPaths=coverage.out

# Skip duplication detection on tests
sonar.cpd.exclusions=**/*_test.go

# Coverage
sonar.go.coverage.reportPaths=coverage.out

# Language and encoding
sonar.language=go
sonar.sourceEncoding=UTF-8