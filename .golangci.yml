version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - exhaustive
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 140
    exhaustive:
      check:
        - switch
        - map
    gosec:
      excludes:
        - G404
    misspell:
      locale: US
    revive:
      enable-default-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: early-return
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming
  exclusions:
    rules:
      - linters:
          - gosec
        text: "G404"
      - path: _test\.go$
        linters:
          - gosec
        text: "G115"
      - path: (^|\\/)test(\\/|\\\\)
        linters:
          - gosec
        text: "G115"
      # bodyclose does not prove cross-function closes; benchClientDo drains+closes.
      - path: (^|[\\/])bench([\\/]).*\.go$
        linters:
          - bodyclose
      # testClientGET/POST and helpers wrap http.Client.Do; mustReadBody closes after read.
      - path: (^|[\\/])test([\\/]).*\.go$
        linters:
          - bodyclose
      # Test-only cookies and subprocess/file fixtures; not production security boundaries.
      - path: _test\.go$
        linters:
          - gosec
        text: "G124"
      - path: (^|[\\/])test([\\/])
        linters:
          - gosec
        text: "G304"
      - path: (^|[\\/])test([\\/])
        linters:
          - gosec
        text: "G204"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
